<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#2c3e50"/></marker>
    <marker id="arrg" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#1a9b5a"/></marker>
  </defs>
  <rect width="940" height="540" fill="#ffffff"/>
  <text x="470" y="30" font-size="19" font-weight="bold" fill="#2c3e50" text-anchor="middle">GrowthPulse System Architecture</text>

  <!-- Node -->
  <rect x="30" y="120" width="180" height="150" rx="12" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
  <text x="120" y="145" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Sensor node</text>
  <text x="120" y="162" font-size="10" fill="#7f8c8d" text-anchor="middle">Heltec V3, firmware v4.3</text>
  <rect x="48" y="175" width="144" height="22" rx="5" fill="#ffffff" stroke="#2ecc71"/><text x="120" y="190" font-size="10" fill="#2c3e50" text-anchor="middle">DS18B20 soil temp</text>
  <rect x="48" y="203" width="144" height="22" rx="5" fill="#ffffff" stroke="#2ecc71"/><text x="120" y="218" font-size="10" fill="#2c3e50" text-anchor="middle">DHT22 air temp + RH</text>
  <rect x="48" y="231" width="144" height="22" rx="5" fill="#ffffff" stroke="#2ecc71"/><text x="120" y="246" font-size="10" fill="#2c3e50" text-anchor="middle">Capacitive moisture</text>

  <!-- WiFi path -->
  <line x1="210" y1="160" x2="430" y2="118" stroke="#1a9b5a" stroke-width="2.5" marker-end="url(#arrg)"/>
  <text x="318" y="120" font-size="10" font-weight="bold" fill="#1a9b5a">Wi-Fi: MQTT state every 3 s</text>

  <!-- LoRa path -->
  <line x1="210" y1="240" x2="250" y2="240" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="252" y="210" width="120" height="60" rx="10" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
  <text x="312" y="234" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">LoRaWAN</text>
  <text x="312" y="250" font-size="10" fill="#7f8c8d" text-anchor="middle">gateway (FSB2)</text>
  <line x1="372" y1="240" x2="400" y2="240" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="402" y="205" width="150" height="70" rx="10" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
  <text x="477" y="228" font-size="11" font-weight="bold" fill="#2c3e50" text-anchor="middle">The Things Stack</text>
  <text x="477" y="244" font-size="9.5" fill="#7f8c8d" text-anchor="middle">OTAA join, session</text>
  <text x="477" y="258" font-size="9.5" fill="#7f8c8d" text-anchor="middle">IS on eu1, NS/JS/AS on nam1</text>
  <line x1="552" y1="240" x2="595" y2="240" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="574" y="228" font-size="9" fill="#2c3e50" text-anchor="middle">webhook</text>

  <!-- Netlify functions -->
  <rect x="597" y="180" width="170" height="120" rx="12" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
  <text x="682" y="203" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">Netlify functions</text>
  <text x="682" y="220" font-size="9.5" fill="#7f8c8d" text-anchor="middle">all cloud tokens server-side</text>
  <text x="682" y="238" font-size="9.5" fill="#2c3e50" text-anchor="middle">lorawan-uplink (decode + route)</text>
  <text x="682" y="253" font-size="9.5" fill="#2c3e50" text-anchor="middle">device-state / history / command</text>
  <text x="682" y="268" font-size="9.5" fill="#2c3e50" text-anchor="middle">provision-device / lorawan</text>
  <text x="682" y="283" font-size="9.5" fill="#2c3e50" text-anchor="middle">switch-wifi / gateway / pdf</text>

  <!-- Losant -->
  <rect x="430" y="60" width="220" height="90" rx="12" fill="#dff5e9" stroke="#1a9b5a" stroke-width="2.5"/>
  <text x="540" y="86" font-size="13" font-weight="bold" fill="#1a9b5a" text-anchor="middle">Losant device cloud</text>
  <text x="540" y="104" font-size="10" fill="#2c3e50" text-anchor="middle">one device per unit, both transports</text>
  <text x="540" y="120" font-size="10" fill="#2c3e50" text-anchor="middle">state + history + alert workflows</text>
  <text x="540" y="136" font-size="10" fill="#2c3e50" text-anchor="middle">single source of truth the app reads</text>

  <!-- webhook to losant -->
  <line x1="682" y1="180" x2="640" y2="152" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="700" y="166" font-size="9" fill="#2c3e50">state write</text>
  <!-- losant to functions read -->
  <line x1="617" y1="135" x2="660" y2="178" stroke="#1a9b5a" stroke-width="2" marker-end="url(#arrg)" stroke-dasharray="5,3"/>
  <text x="664" y="158" font-size="9" fill="#1a9b5a">reads</text>

  <!-- App -->
  <rect x="790" y="120" width="120" height="180" rx="14" fill="#2c3e50"/>
  <rect x="800" y="136" width="100" height="148" rx="6" fill="#ffffff"/>
  <text x="850" y="158" font-size="11" font-weight="bold" fill="#1a9b5a" text-anchor="middle">GrowthPulse</text>
  <text x="850" y="174" font-size="8.5" fill="#7f8c8d" text-anchor="middle">growthpulsecloud.com</text>
  <rect x="810" y="186" width="80" height="26" rx="4" fill="#dff5e9"/><text x="850" y="203" font-size="8.5" fill="#2c3e50" text-anchor="middle">Live dashboard</text>
  <rect x="810" y="218" width="80" height="26" rx="4" fill="#eef0f2"/><text x="850" y="235" font-size="8.5" fill="#2c3e50" text-anchor="middle">Alarms + history</text>
  <rect x="810" y="250" width="80" height="26" rx="4" fill="#eef0f2"/><text x="850" y="267" font-size="8.5" fill="#2c3e50" text-anchor="middle">Reports (PDF)</text>
  <line x1="767" y1="240" x2="788" y2="240" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="850" y="318" font-size="10" fill="#2c3e50" text-anchor="middle">React app (PWA)</text>

  <!-- Supabase -->
  <rect x="240" y="380" width="460" height="110" rx="12" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
  <text x="470" y="404" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">Supabase  (accounts, identity, routing; RLS on every table)</text>
  <rect x="258" y="418" width="100" height="52" rx="6" fill="#ffffff" stroke="#7f8c8d"/><text x="308" y="440" font-size="9.5" fill="#2c3e50" text-anchor="middle">auth.users</text><text x="308" y="454" font-size="8.5" fill="#7f8c8d" text-anchor="middle">tier, profile</text>
  <rect x="368" y="418" width="100" height="52" rx="6" fill="#ffffff" stroke="#7f8c8d"/><text x="418" y="440" font-size="9.5" fill="#2c3e50" text-anchor="middle">device_registry</text><text x="418" y="454" font-size="8.5" fill="#7f8c8d" text-anchor="middle">code to device</text>
  <rect x="478" y="418" width="100" height="52" rx="6" fill="#ffffff" stroke="#7f8c8d"/><text x="528" y="440" font-size="9.5" fill="#2c3e50" text-anchor="middle">devices</text><text x="528" y="454" font-size="8.5" fill="#7f8c8d" text-anchor="middle">ownership</text>
  <rect x="588" y="418" width="100" height="52" rx="6" fill="#ffffff" stroke="#7f8c8d"/><text x="638" y="436" font-size="9.5" fill="#2c3e50" text-anchor="middle">lorawan_devices</text><text x="638" y="450" font-size="8.5" fill="#7f8c8d" text-anchor="middle">routes + keys</text><text x="638" y="462" font-size="8.5" fill="#7f8c8d" text-anchor="middle">+ gateways</text>

  <line x1="682" y1="300" x2="660" y2="378" stroke="#2c3e50" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="694" y="344" font-size="9" fill="#2c3e50">service role</text>
  <line x1="800" y1="305" x2="600" y2="416" stroke="#1a9b5a" stroke-width="2" marker-end="url(#arrg)" stroke-dasharray="5,3"/>
  <text x="742" y="372" font-size="9" fill="#1a9b5a">anon key + RLS</text>

  <!-- control path note -->
  <rect x="30" y="320" width="180" height="80" rx="10" fill="#fff7e8" stroke="#f4a52b" stroke-width="1.5"/>
  <text x="120" y="342" font-size="10" font-weight="bold" fill="#2c3e50" text-anchor="middle">Commands down</text>
  <text x="120" y="358" font-size="9" fill="#2c3e50" text-anchor="middle">Wi-Fi: Losant MQTT, instant</text>
  <text x="120" y="372" font-size="9" fill="#2c3e50" text-anchor="middle">LoRaWAN: queued downlink,</text>
  <text x="120" y="386" font-size="9" fill="#2c3e50" text-anchor="middle">lands on next uplink</text>

  <text x="470" y="522" font-size="10" fill="#7f8c8d" text-anchor="middle">Both transports write to the same Losant device, so a node stays one plant in the app no matter how it connects.</text>
</svg>
