<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ia" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#2c3e50"/></marker>
  </defs>
  <rect width="920" height="300" fill="#ffffff"/>
  <text x="460" y="30" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Identity and Claiming  (one permanent identity, three surfaces)</text>

  <g font-size="10.5" fill="#2c3e50">
    <rect x="40" y="70" width="150" height="80" rx="10" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
    <text x="115" y="94" text-anchor="middle" font-weight="bold">Chip efuse MAC</text>
    <text x="115" y="112" text-anchor="middle">factory-burned,</text>
    <text x="115" y="126" text-anchor="middle">unique, permanent</text>
    <line x1="190" y1="110" x2="222" y2="110" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#ia)"/>

    <rect x="224" y="70" width="150" height="80" rx="10" fill="#dff5e9" stroke="#1a9b5a" stroke-width="2"/>
    <text x="299" y="94" text-anchor="middle" font-weight="bold">Pairing code</text>
    <text x="299" y="112" text-anchor="middle">24 bits as hex,</text>
    <text x="299" y="126" text-anchor="middle">e.g. 04A7AC</text>
    <text x="299" y="142" text-anchor="middle" fill="#7f8c8d">survives every reset</text>
    <line x1="374" y1="110" x2="406" y2="110" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#ia)"/>

    <rect x="408" y="70" width="170" height="80" rx="10" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="493" y="90" text-anchor="middle" font-weight="bold">Three surfaces</text>
    <text x="493" y="108" text-anchor="middle">big on the OLED</text>
    <text x="493" y="122" text-anchor="middle">in the hotspot name</text>
    <text x="493" y="136" text-anchor="middle">in the registry</text>
    <line x1="578" y1="110" x2="610" y2="110" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#ia)"/>

    <rect x="612" y="70" width="160" height="80" rx="10" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
    <text x="692" y="94" text-anchor="middle" font-weight="bold">device_registry</text>
    <text x="692" y="112" text-anchor="middle">code maps to the unit's</text>
    <text x="692" y="126" text-anchor="middle">Losant device id</text>
    <text x="692" y="142" text-anchor="middle" fill="#7f8c8d">written at self-provision</text>
    <line x1="772" y1="110" x2="804" y2="110" stroke="#2c3e50" stroke-width="2.5" marker-end="url(#ia)"/>

    <rect x="806" y="70" width="90" height="80" rx="10" fill="#dff5e9" stroke="#1a9b5a" stroke-width="2"/>
    <text x="851" y="100" text-anchor="middle" font-weight="bold">Claim</text>
    <text x="851" y="118" text-anchor="middle">typed once</text>
    <text x="851" y="132" text-anchor="middle">in the app</text>
  </g>

  <g font-size="10.5" fill="#2c3e50">
    <rect x="40" y="180" width="420" height="90" rx="10" fill="#fff7e8" stroke="#f4a52b" stroke-width="1.5"/>
    <text x="250" y="204" text-anchor="middle" font-weight="bold">Why this works after any reset or reflash</text>
    <text x="250" y="222" text-anchor="middle">The code is computed from silicon, so a reset board posts the</text>
    <text x="250" y="237" text-anchor="middle">same code and the registry returns the same Losant device.</text>
    <text x="250" y="252" text-anchor="middle">No duplicates, ever: provisioning is idempotent.</text>

    <rect x="480" y="180" width="416" height="90" rx="10" fill="#eef0f2" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="688" y="204" text-anchor="middle" font-weight="bold">Why the customer types the code</text>
    <text x="688" y="222" text-anchor="middle">During setup the phone is on the device's hotspot with no internet,</text>
    <text x="688" y="237" text-anchor="middle">so silent account binding is impossible. One short code, typed once,</text>
    <text x="688" y="252" text-anchor="middle">validated against the registry; unknown codes are rejected.</text>
  </g>
</svg>
