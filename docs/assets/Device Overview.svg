<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="da" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#7f8c8d"/></marker>
  </defs>
  <rect width="920" height="430" fill="#ffffff"/>
  <text x="460" y="32" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Meet Your GrowthPulse</text>

  <!-- device body -->
  <rect x="330" y="70" width="260 " height="300" rx="18" fill="#eef0f2" stroke="#2c3e50" stroke-width="2.5"/>
  <!-- screen -->
  <rect x="370" y="100" width="180" height="100" rx="8" fill="#2c3e50"/>
  <text x="460" y="126" font-size="11" fill="#2ecc71" text-anchor="middle">PAIR CODE        Wi-Fi ON</text>
  <text x="538" y="142" font-size="8" fill="#9fb2c0" text-anchor="end">v4.3</text>
  <text x="460" y="178" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle">04A7AC</text>
  <!-- buttons -->
  <circle cx="395" cy="240" r="16" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
  <text x="395" y="245" font-size="9" fill="#2c3e50" text-anchor="middle">PRG</text>
  <circle cx="525" cy="240" r="16" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
  <text x="525" y="245" font-size="9" fill="#2c3e50" text-anchor="middle">RST</text>
  <!-- usb -->
  <rect x="425" y="352" width="70" height="18" rx="6" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
  <text x="460" y="345" font-size="9.5" fill="#7f8c8d" text-anchor="middle">USB-C</text>
  <!-- antenna -->
  <line x1="330" y1="86" x2="296" y2="86" stroke="#2c3e50" stroke-width="2.5"/>
  <circle cx="292" cy="86" r="5" fill="none" stroke="#2c3e50" stroke-width="2.5"/>

  <!-- sensor cables out the right -->
  <path d="M590 300 C 650 300 650 130 700 122" stroke="#7f8c8d" stroke-width="3" fill="none"/>
  <path d="M590 312 C 660 318 660 220 700 216" stroke="#7f8c8d" stroke-width="3" fill="none"/>
  <path d="M590 324 C 670 334 660 312 700 310" stroke="#7f8c8d" stroke-width="3" fill="none"/>
  <g font-size="11" fill="#2c3e50">
    <rect x="702" y="96" width="190" height="52" rx="9" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
    <text x="797" y="118" text-anchor="middle" font-weight="bold">Soil temperature probe</text>
    <text x="797" y="136" text-anchor="middle" fill="#7f8c8d">waterproof, bury near roots</text>
    <rect x="702" y="190" width="190" height="52" rx="9" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
    <text x="797" y="212" text-anchor="middle" font-weight="bold">Air sensor</text>
    <text x="797" y="230" text-anchor="middle" fill="#7f8c8d">temperature and humidity</text>
    <rect x="702" y="284" width="190" height="52" rx="9" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
    <text x="797" y="306" text-anchor="middle" font-weight="bold">Soil moisture probe</text>
    <text x="797" y="324" text-anchor="middle" fill="#7f8c8d">insert to its marked line</text>
  </g>

  <!-- callouts left -->
  <g font-size="11" fill="#2c3e50">
    <rect x="30" y="96" width="230" height="64" rx="9" fill="#ffffff" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="145" y="118" text-anchor="middle" font-weight="bold">Built-in screen</text>
    <text x="145" y="134" text-anchor="middle" fill="#7f8c8d">pairing code, connection, readings;</text>
    <text x="145" y="148" text-anchor="middle" fill="#7f8c8d">rotates every few seconds</text>
    <line x1="260" y1="128" x2="366" y2="140" stroke="#7f8c8d" stroke-width="1.6" marker-end="url(#da)"/>

    <rect x="30" y="196" width="230" height="78" rx="9" fill="#ffffff" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="145" y="218" text-anchor="middle" font-weight="bold">PRG button</text>
    <text x="145" y="234" text-anchor="middle" fill="#7f8c8d">tap: wake   double tap: sleep</text>
    <text x="145" y="248" text-anchor="middle" fill="#7f8c8d">hold 3 s: back to Wi-Fi (Farm Kit)</text>
    <text x="145" y="262" text-anchor="middle" fill="#7f8c8d">hold 10 s: full reset</text>
    <line x1="260" y1="236" x2="377" y2="240" stroke="#7f8c8d" stroke-width="1.6" marker-end="url(#da)"/>

    <rect x="30" y="306" width="230" height="58" rx="9" fill="#ffffff" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="145" y="328" text-anchor="middle" font-weight="bold">USB-C power</text>
    <text x="145" y="344" text-anchor="middle" fill="#7f8c8d">any standard 5V adapter;</text>
    <text x="145" y="357" text-anchor="middle" fill="#7f8c8d">also charges battery units</text>
    <line x1="260" y1="338" x2="420" y2="360" stroke="#7f8c8d" stroke-width="1.6" marker-end="url(#da)"/>
  </g>

  <text x="460" y="408" font-size="10.5" fill="#7f8c8d" text-anchor="middle">The pairing code on the screen is also your unit's serial number. It never goes away, so you can always re-pair or get support.</text>
</svg>
