<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3"><circle cx="3" cy="3" r="2.4" fill="#2c3e50"/></marker>
  </defs>
  <rect width="920" height="600" fill="#ffffff"/>
  <text x="460" y="30" font-size="19" font-weight="bold" fill="#2c3e50" text-anchor="middle">GrowthPulse Node Wiring  (Heltec WiFi LoRa 32 V3)</text>

  <!-- Board -->
  <rect x="60" y="80" width="270" height="420" rx="14" fill="#eef0f2" stroke="#2c3e50" stroke-width="2"/>
  <text x="195" y="108" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Heltec WiFi LoRa 32 V3</text>
  <text x="195" y="126" font-size="11" fill="#7f8c8d" text-anchor="middle">HTIT-WB32LAF</text>
  <!-- OLED -->
  <rect x="125" y="140" width="140" height="64" rx="4" fill="#2c3e50"/>
  <text x="195" y="168" font-size="10" fill="#2ecc71" text-anchor="middle">PAIR CODE</text>
  <text x="195" y="188" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">04A7AC</text>
  <!-- buttons / usb -->
  <rect x="92" y="218" width="44" height="20" rx="4" fill="#ffffff" stroke="#2c3e50"/>
  <text x="114" y="232" font-size="9" fill="#2c3e50" text-anchor="middle">PRG</text>
  <rect x="254" y="218" width="44" height="20" rx="4" fill="#ffffff" stroke="#2c3e50"/>
  <text x="276" y="232" font-size="9" fill="#2c3e50" text-anchor="middle">RST</text>
  <rect x="160" y="500" width="70" height="22" rx="5" fill="#ffffff" stroke="#2c3e50"/>
  <text x="195" y="515" font-size="9" fill="#2c3e50" text-anchor="middle">USB-C 5V</text>
  <!-- antenna -->
  <line x1="60" y1="95" x2="20" y2="95" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="20" cy="95" r="4" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <text x="22" y="80" font-size="9" fill="#7f8c8d">915 MHz antenna</text>

  <!-- Right-side pins -->
  <g font-size="12" font-weight="bold">
    <rect x="318" y="270" width="46" height="22" rx="4" fill="#f6c343" stroke="#2c3e50"/><text x="341" y="285" text-anchor="middle" fill="#2c3e50">4</text>
    <rect x="318" y="310" width="46" height="22" rx="4" fill="#13a4ff" stroke="#2c3e50"/><text x="341" y="325" text-anchor="middle" fill="#ffffff">5</text>
    <rect x="318" y="350" width="46" height="22" rx="4" fill="#2ecc71" stroke="#2c3e50"/><text x="341" y="365" text-anchor="middle" fill="#ffffff">2</text>
    <rect x="318" y="390" width="46" height="22" rx="4" fill="#e74c3c" stroke="#2c3e50"/><text x="341" y="405" text-anchor="middle" fill="#ffffff">3V3</text>
    <rect x="318" y="430" width="46" height="22" rx="4" fill="#f4a52b" stroke="#2c3e50"/><text x="341" y="445" text-anchor="middle" fill="#ffffff">5V</text>
    <rect x="318" y="470" width="46" height="22" rx="4" fill="#2c3e50" stroke="#2c3e50"/><text x="341" y="485" text-anchor="middle" fill="#ffffff">GND</text>
  </g>
  <text x="341" y="262" font-size="9" fill="#7f8c8d" text-anchor="middle">header pins (by silkscreen label)</text>

  <!-- Bus wires -->
  <!-- 3V3 rail -->
  <polyline points="364,401 470,401" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <polyline points="470,401 470,160 560,160" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <polyline points="470,300 560,300" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <!-- 5V rail -->
  <polyline points="364,441 500,441 500,425 560,425" fill="none" stroke="#f4a52b" stroke-width="3"/>
  <!-- GND rail -->
  <polyline points="364,481 530,481" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <polyline points="530,481 530,190 560,190" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <polyline points="530,330 560,330" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <polyline points="530,455 560,455" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <!-- GPIO4 to DS18B20 data -->
  <polyline points="364,281 440,281 440,130 560,130" fill="none" stroke="#f6c343" stroke-width="3"/>
  <!-- GPIO5 to DHT22 data -->
  <polyline points="364,321 420,321 420,270 560,270" fill="none" stroke="#13a4ff" stroke-width="3"/>
  <!-- GPIO2 to soil AO -->
  <polyline points="364,361 400,361 400,395 560,395" fill="none" stroke="#2ecc71" stroke-width="3"/>

  <!-- Pull-up resistors -->
  <g>
    <rect x="487" y="118" width="60" height="20" rx="4" fill="#ffffff" stroke="#e74c3c" stroke-width="1.6"/>
    <text x="517" y="132" font-size="10" font-weight="bold" fill="#e74c3c" text-anchor="middle">4.7 k</text>
    <line x1="517" y1="118" x2="517" y2="101" stroke="#e74c3c" stroke-width="2"/>
    <line x1="470" y1="101" x2="517" y2="101" stroke="#e74c3c" stroke-width="2"/>
    <line x1="470" y1="101" x2="470" y2="160" stroke="#e74c3c" stroke-width="2"/>
    <line x1="517" y1="138" x2="517" y2="130" stroke="#e74c3c" stroke-width="0"/>
    <circle cx="517" cy="130" r="0" fill="none"/>
    <line x1="517" y1="138" x2="517" y2="130" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="517" cy="130" r="2.4" fill="#f6c343"/>
    <text x="556" y="108" font-size="9" fill="#e74c3c" text-anchor="end">REQUIRED: data to 3V3</text>
  </g>
  <g>
    <rect x="487" y="240" width="60" height="20" rx="4" fill="#ffffff" stroke="#e74c3c" stroke-width="1.6"/>
    <text x="517" y="254" font-size="10" font-weight="bold" fill="#e74c3c" text-anchor="middle">10 k</text>
    <line x1="517" y1="260" x2="517" y2="270" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="517" cy="270" r="2.4" fill="#13a4ff"/>
    <line x1="517" y1="240" x2="517" y2="226" stroke="#e74c3c" stroke-width="2"/>
    <line x1="490" y1="226" x2="517" y2="226" stroke="#e74c3c" stroke-width="2"/>
    <line x1="490" y1="226" x2="490" y2="300" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="490" cy="300" r="2.4" fill="#e74c3c"/>
    <text x="556" y="232" font-size="9" fill="#e74c3c" text-anchor="end">built into 3-pin modules</text>
  </g>

  <!-- DS18B20 -->
  <g>
    <rect x="560" y="92" width="320" height="110" rx="10" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="720" y="112" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">DS18B20  soil temperature probe</text>
    <text x="585" y="135" font-size="11" fill="#2c3e50">DATA (yellow)</text>
    <text x="585" y="165" font-size="11" fill="#2c3e50">VDD (red)</text>
    <text x="585" y="195" font-size="11" fill="#2c3e50">GND (black)</text>
    <text x="868" y="135" font-size="10" fill="#7f8c8d" text-anchor="end">GPIO 4</text>
    <text x="868" y="165" font-size="10" fill="#7f8c8d" text-anchor="end">3V3</text>
    <text x="868" y="195" font-size="10" fill="#7f8c8d" text-anchor="end">GND</text>
    <rect x="800" y="145" width="14" height="44" rx="7" fill="#b9c2c9"/>
    <text x="807" y="207" font-size="8" fill="#7f8c8d" text-anchor="middle"> </text>
  </g>

  <!-- DHT22 -->
  <g>
    <rect x="560" y="236" width="320" height="110" rx="10" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="720" y="256" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">DHT22  air temperature + humidity</text>
    <text x="585" y="275" font-size="11" fill="#2c3e50">DATA (pin 2)</text>
    <text x="585" y="305" font-size="11" fill="#2c3e50">VCC (pin 1)</text>
    <text x="585" y="335" font-size="11" fill="#2c3e50">GND (pin 4)   NC (pin 3): unconnected</text>
    <text x="868" y="275" font-size="10" fill="#7f8c8d" text-anchor="end">GPIO 5</text>
    <text x="868" y="305" font-size="10" fill="#7f8c8d" text-anchor="end">3V3</text>
    <text x="868" y="335" font-size="10" fill="#7f8c8d" text-anchor="end">GND</text>
  </g>

  <!-- Soil moisture -->
  <g>
    <rect x="560" y="372" width="320" height="118" rx="10" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="720" y="392" font-size="13" font-weight="bold" fill="#2c3e50" text-anchor="middle">Capacitive soil moisture probe</text>
    <text x="585" y="402" font-size="11" fill="#2c3e50">AO (analog out)</text>
    <text x="585" y="432" font-size="11" fill="#2c3e50">VCC</text>
    <text x="585" y="462" font-size="11" fill="#2c3e50">GND</text>
    <text x="868" y="402" font-size="10" fill="#7f8c8d" text-anchor="end">GPIO 2</text>
    <text x="868" y="432" font-size="10" font-weight="bold" fill="#f4a52b" text-anchor="end">5V  (not 3V3)</text>
    <text x="868" y="462" font-size="10" fill="#7f8c8d" text-anchor="end">GND</text>
    <text x="720" y="482" font-size="9" fill="#e74c3c" text-anchor="middle">NE555 oscillator needs more than 4V: at 3.3V it reads a frozen 100 percent</text>
  </g>

  <!-- legend -->
  <g font-size="10" fill="#2c3e50">
    <rect x="60" y="540" width="820" height="40" rx="8" fill="#eef0f2"/>
    <line x1="80" y1="560" x2="108" y2="560" stroke="#e74c3c" stroke-width="3"/><text x="114" y="564">3V3</text>
    <line x1="160" y1="560" x2="188" y2="560" stroke="#f4a52b" stroke-width="3"/><text x="194" y="564">5V</text>
    <line x1="234" y1="560" x2="262" y2="560" stroke="#2c3e50" stroke-width="3"/><text x="268" y="564">GND</text>
    <line x1="320" y1="560" x2="348" y2="560" stroke="#f6c343" stroke-width="3"/><text x="354" y="564">1-Wire data</text>
    <line x1="440" y1="560" x2="468" y2="560" stroke="#13a4ff" stroke-width="3"/><text x="474" y="564">DHT22 data</text>
    <line x1="560" y1="560" x2="588" y2="560" stroke="#2ecc71" stroke-width="3"/><text x="594" y="564">analog (ADC1, 12-bit)</text>
    <text x="868" y="564" text-anchor="end" fill="#7f8c8d">Avoid GPIO1 (battery sense) and GPIO19/20 (ADC2)</text>
  </g>
</svg>
